<html lang="en">

<style>
:root{
  --ink:#16131A;--muted:#7C7682;--line:#E5E0E6;--paper:#F2F0F3;
  --card:#FFFFFF;--pitch:#0E5C3E;--grey:#C2B8BC;
  --wc-bg:#003380;--wc-gold:#FFC300;--wc-orange:#FF6B35;
}
*{box-sizing:border-box;}
html,body{margin:0;}
body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1080px;margin:0 auto;padding:0 16px;}
.hidden{display:none !important;}
button{font-family:inherit;cursor:pointer;}

/* ── MASTHEAD ── */
.mast{padding:36px 0 22px;border-bottom:2px solid var(--ink);margin-bottom:26px;}
.mast .eyebrow{font-family:"Oswald",sans-serif;text-transform:uppercase;letter-spacing:4px;font-size:12px;color:var(--pitch);margin:0 0 6px;}
.mast h1{font-family:"Oswald",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:1px;font-size:clamp(28px,5vw,44px);margin:0;line-height:1;}
.mast .tag{color:var(--muted);font-size:15px;margin:10px 0 0;}
.stats{display:flex;gap:26px;flex-wrap:wrap;margin-top:16px;}
.stat .n{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:22px;}
.stat .l{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}

/* ── FILTERS ── */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;}
.filters button{background:var(--card);border:1px solid var(--line);border-radius:30px;padding:7px 15px;font-size:13px;color:var(--ink);transition:.15s;white-space:nowrap;}
.filters button:hover{border-color:var(--ink);}
.filters button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.filters button.wc-btn{background:var(--wc-bg);color:var(--wc-gold);border-color:var(--wc-bg);font-weight:700;letter-spacing:.5px;}
.filters button.wc-btn:hover{background:#004BB8;}
.filters button.back-btn{background:#F5F0F2;border-color:var(--line);font-weight:600;}

/* ── BOARD ── */
.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px;padding-bottom:50px;}

/* ── PLAYER CARDS ── */
.pcard{background:var(--card);border:1px solid var(--line);border-radius:8px;overflow:hidden;text-align:left;padding:0;transition:.18s;display:flex;flex-direction:column;}
.pcard:hover{transform:translateY(-3px);box-shadow:0 16px 34px -22px rgba(20,8,16,.5);border-color:var(--c,#999);}
.pcard .top{padding:16px 18px;color:#fff;position:relative;overflow:hidden;}
.pcard .ghost{position:absolute;right:-6px;top:-26px;font-family:"Oswald",sans-serif;font-weight:700;font-size:110px;line-height:1;color:rgba(0,0,0,.15);}
.pcard .club{position:relative;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;opacity:.85;}
.pcard .nm{position:relative;font-family:"Oswald",sans-serif;font-weight:600;font-size:23px;line-height:1.05;text-transform:uppercase;margin-top:3px;}
.pcard .sub{position:relative;font-size:12.5px;opacity:.9;margin-top:6px;}
.pcard .body{padding:14px 18px 16px;flex:1;display:flex;flex-direction:column;gap:12px;}
.pcard .vt{font-size:13.5px;color:#34303a;line-height:1.45;}
.pcard .badge{align-self:flex-start;margin-top:auto;font-family:"IBM Plex Mono",monospace;font-size:11.5px;font-weight:600;background:#F1EEF2;border-radius:5px;padding:5px 9px;}
.pcard .badge b{color:var(--c,#333);}
.pcard .feat-star{position:absolute;top:12px;right:12px;background:var(--wc-gold);color:#1A1200;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;line-height:1;}

/* ── ADD TILE ── */
.addtile{border:1.5px dashed var(--line);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 18px;color:var(--muted);min-height:200px;}
.addtile .plus{font-family:"Oswald",sans-serif;font-size:34px;color:var(--line);}
.addtile p{margin:10px 0 0;font-size:13px;max-width:200px;}

/* ── WORLD CUP ── */
.wc-view{padding-bottom:50px;}
.wc-banner{position:relative;background:var(--wc-bg);overflow:hidden;border-radius:8px;margin-bottom:22px;padding:30px 24px 24px;color:#fff;}
.wc-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#FFC300 0%,#FF6B35 50%,#FFC300 100%);}
.wc-banner::after{content:'';position:absolute;top:-60px;right:-60px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,195,0,.18) 0%,transparent 70%);pointer-events:none;}
.wc-deco{position:absolute;bottom:-40px;left:20%;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(255,107,53,.14) 0%,transparent 70%);pointer-events:none;}
.wc-ghost{position:absolute;right:18px;bottom:-18px;font-family:"Oswald",sans-serif;font-weight:700;font-size:110px;line-height:1;color:rgba(255,195,0,.10);letter-spacing:-4px;pointer-events:none;user-select:none;}
.wc-eyebrow{font-family:"Oswald",sans-serif;font-weight:500;letter-spacing:4px;font-size:11px;color:var(--wc-gold);text-transform:uppercase;margin:0 0 8px;position:relative;}
.wc-title{font-family:"Oswald",sans-serif;font-weight:700;font-size:clamp(34px,7vw,56px);line-height:.95;text-transform:uppercase;letter-spacing:.5px;color:#fff;margin:0;position:relative;}
.wc-title span{color:var(--wc-gold);}
.wc-sub{font-size:13.5px;color:rgba(255,255,255,.75);margin-top:12px;position:relative;}
.wc-meta{display:flex;gap:20px;flex-wrap:wrap;margin-top:16px;position:relative;}
.wc-stat .n{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:20px;color:var(--wc-gold);}
.wc-stat .l{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.6);}
.wc-back{background:none;border:1px solid rgba(255,255,255,.25);border-radius:30px;padding:8px 16px;font-size:13px;color:rgba(255,255,255,.8);margin-top:16px;display:inline-block;position:relative;transition:.15s;}
.wc-back:hover{border-color:var(--wc-gold);color:var(--wc-gold);}

/* ── COMPARE OVERLAY ── */
.compare-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(22,19,26,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.compare-panel{background:#fff;border-radius:10px;width:100%;max-width:480px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 60px -20px rgba(0,0,0,.5);}
.compare-panel-head{padding:18px 20px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.compare-panel-head h3{font-family:"Oswald",sans-serif;font-size:20px;text-transform:uppercase;letter-spacing:.5px;margin:0;}
.compare-panel-head button{background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;padding:4px 8px;}
.compare-search-wrap{padding:14px 16px 10px;}
.compare-search-input{width:100%;padding:10px 14px;border:1px solid var(--line);border-radius:30px;font-size:14px;font-family:"Inter",sans-serif;outline:none;}
.compare-results{overflow-y:auto;padding:0 10px 12px;}
.compare-result-item{display:flex;align-items:center;gap:12px;padding:10px;border-radius:6px;cursor:pointer;transition:.12s;}
.compare-result-item:hover{background:#F5F2F6;}
.compare-result-dot{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:"Oswald",sans-serif;font-size:11px;font-weight:700;color:#fff;}
.compare-result-name{font-weight:600;font-size:14px;}
.compare-result-sub{font-size:12px;color:var(--muted);}
.compare-empty{padding:20px;text-align:center;color:var(--muted);font-size:13px;}

/* ── REPORT DETAIL ── */
.report-view{padding:18px 0 60px;}
.report-view-actions{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.backbtn{background:none;border:1px solid var(--line);border-radius:30px;padding:8px 16px;font-size:13px;color:var(--ink);}
.backbtn:hover{border-color:var(--ink);}
.report{background:var(--card);border:1px solid var(--line);border-radius:6px;overflow:hidden;box-shadow:0 18px 50px -30px rgba(40,10,20,.4);}
.np{position:relative;background:var(--claret);color:#fff;padding:20px 22px;overflow:hidden;border-radius:5px 5px 0 0;}
.np-ghost{position:absolute;right:6px;top:-38px;font-family:"Oswald",sans-serif;font-weight:700;font-size:150px;line-height:1;color:rgba(255,255,255,.08);letter-spacing:-8px;pointer-events:none;}
.eb{text-transform:uppercase;letter-spacing:2.5px;font-size:8px;color:var(--blue);margin-bottom:4px;}
.np h2{font-family:"Oswald",sans-serif;font-weight:700;font-size:clamp(30px,5.5vw,50px);line-height:.98;margin:0;text-transform:uppercase;letter-spacing:.5px;}
.np-meta{display:flex;flex-wrap:wrap;gap:5px 16px;margin-top:14px;font-size:13px;color:rgba(255,255,255,.86);}
.np-meta b{color:#fff;font-weight:600;}
.np-meta .dot{color:var(--blue);}
.np-right{display:flex;flex-direction:column;gap:13px;align-items:flex-end;justify-content:center;}
.chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-start;margin-top:14px;}
.chip{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);border-radius:4px;padding:6px 11px;}
.chip .k{display:block;font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);}
.chip .v{display:block;font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:14px;color:#fff;margin-top:2px;}
.pitch-wrap{width:250px;}
.pitch-cap{font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-top:3px;}
.np-grid{position:relative;display:flex;gap:26px;justify-content:space-between;flex-wrap:wrap;}
.np-left{min-width:240px;flex:1;}
.verdict-block{background:#fff;border:1px solid #E7DFE2;border-top:none;border-left:4px solid var(--claret);padding:14px 20px;}
.verdict-block .eb2{text-transform:uppercase;letter-spacing:2px;font-size:8px;color:var(--claret);margin-bottom:3px;}
.verdict-block p{margin:2px 0 0;font-size:15px;font-weight:600;line-height:1.45;}
.block{background:#fff;border:1px solid #E7DFE2;border-top:none;padding:12px 20px;}
.eb2{text-transform:uppercase;letter-spacing:2px;font-size:8px;color:var(--claret);margin-bottom:3px;}
.bt{font-family:"Oswald",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:16px;margin-bottom:10px;}
.lede{font-size:13px;color:#34272c;line-height:1.6;}
.legend{display:flex;gap:18px;flex-wrap:wrap;margin:0 0 12px;font-size:11px;color:var(--muted);}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.legend i{width:9px;height:9px;border-radius:2px;display:inline-block;}
.bar{display:grid;grid-template-columns:170px 1fr 48px;align-items:center;gap:12px;margin:8px 0;}
.bar-label{font-size:12px;font-weight:500;}
.bar-label small{display:block;font-family:"IBM Plex Mono",monospace;color:var(--muted);font-size:10px;margin-top:1px;}
.track{background:#EFEAEC;border-radius:3px;height:13px;overflow:hidden;}
.fill{height:100%;width:0;border-radius:3px;transition:width .9s cubic-bezier(.22,1,.36,1);}
.pct{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:16px;text-align:right;}
.pct small{font-size:9px;color:var(--muted);}
.rates{display:flex;gap:26px;flex-wrap:wrap;margin-top:10px;}
.rate{flex:1;min-width:160px;}
.rate-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.rate-top .lab{font-size:12px;font-weight:500;}
.rate-top .num{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:16px;}
.rate-track{background:#EFEAEC;border-radius:3px;height:9px;overflow:hidden;}
.rate-fill{height:9px;width:0;border-radius:3px;background:var(--muted);transition:width .9s cubic-bezier(.22,1,.36,1);}
.note{font-size:10px;color:var(--muted);margin-top:10px;}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:26px;}
.col h4{font-family:"Oswald",sans-serif;text-transform:uppercase;letter-spacing:1px;font-size:12px;margin:0 0 8px;}
/* FIXED: these use hard colours so they never vanish against a white background */
.col.s h4{color:#1565C0;}
.col.w h4{color:#822D3A;}
.col ul{list-style:none;margin:0;padding:0;}
.col li{position:relative;padding-left:14px;margin-bottom:8px;font-size:12.5px;line-height:1.5;}
.col.s li:before{content:"+";position:absolute;left:0;color:#1565C0;font-weight:bold;}
.col.w li:before{content:"\2013";position:absolute;left:0;color:#822D3A;font-weight:bold;}
.callout{background:#FBF7F4;border:1px solid #E7DFE2;border-radius:4px;padding:12px 14px;}
.callout p{margin:0;font-size:12px;color:#34272c;line-height:1.6;}
.foot-r{border:1px solid #E7DFE2;border-top:none;border-radius:0 0 6px 6px;background:#FBF9F8;padding:12px 20px;font-size:10px;color:var(--muted);}
.foot-r .method{color:var(--claret);font-weight:600;margin-bottom:8px;font-size:10.5px;}
.foot-r .fr{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.foot-r b{color:#4a3b40;}

/* ── SUBSCRIBE FORM ── */
.sub-form{background:var(--ink);border-radius:8px;padding:28px 24px;margin:40px 0;color:#fff;}
.sub-form h3{font-family:"Oswald",sans-serif;font-size:22px;text-transform:uppercase;letter-spacing:.5px;margin:0 0 6px;}
.sub-form p{font-size:13px;color:rgba(255,255,255,.65);margin:0 0 20px;}
.sub-inputs{display:flex;gap:10px;flex-wrap:wrap;}
.sub-inputs input{flex:1;min-width:160px;padding:10px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:13px;font-family:"Inter",sans-serif;}
.sub-inputs input::placeholder{color:rgba(255,255,255,.4);}
.sub-inputs button{padding:10px 20px;border-radius:6px;border:none;background:#1CA4DA;color:#fff;font-size:13px;font-weight:600;font-family:"Inter",sans-serif;cursor:pointer;white-space:nowrap;}
.sub-msg{margin-top:10px;font-size:13px;color:rgba(255,255,255,.75);}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .np,.verdict-block,.block,.foot-r{padding-left:16px;padding-right:16px;}
  .np-ghost{font-size:110px;}
  .bar{grid-template-columns:120px 1fr 44px;gap:8px;}
  .cols{grid-template-columns:1fr;gap:16px;}
  .np-right{align-items:flex-start;}
  .pitch-wrap{width:100%;}
  .wc-banner{border-radius:6px;padding:24px 18px 20px;}
}
@media print{
  body{background:#fff;}
  #boardView,#worldCupView,#compareOverlay,
  .report-view-actions,.sub-form,
  #searchInput,.filters{display:none!important;}
  .report-view{padding:0;}
  .wrap{padding:0;max-width:none;}
  .report{box-shadow:none;border:none;border-radius:0;}
  .block,.verdict-block,.foot-r{break-inside:avoid;}
  .np{border-radius:0;}
  .fill{transition:none;}
}
@media(prefers-reduced-motion:reduce){.fill,.rate-fill,.pcard{transition:none;}}
</style>

<div class="wrap">

/* ══ HELPERS ══ */
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const topMetric = p => [...p.percentiles].sort((a,b)=>b.pct-a.pct)[0];
const tier = pct => pct>=80?'#1565C0':pct>=50?'#822D3A':'#A0968C';

const Z={GK:[6,50,24,22],CB:[6,44,50,34],RB:[6,82,66,34],LB:[6,6,66,34],RWB:[6,82,114,30],LWB:[6,6,114,30],DM:[54,38,46,46],CM:[88,34,54,54],AM:[126,36,50,50],RW:[114,88,72,28],LW:[114,6,72,28],ST:[142,40,42,42]};
function pitchSVG(pos){
  const rects=pos.map(p=>Z[p]).filter(Boolean).map(([x,y,w,h])=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="#fff" fill-opacity="0.5"/>`).join('');
  return `<svg viewBox="0 0 188 120" width="100%"><rect x="1" y="1" width="186" height="118" rx="4" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.35)"/><line x1="94" y1="2" x2="94" y2="118" stroke="rgba(255,255,255,.35)"/><circle cx="94" cy="60" r="15" fill="none" stroke="rgba(255,255,255,.35)"/><rect x="2" y="36" width="24" height="48" fill="none" stroke="rgba(255,255,255,.35)"/><rect x="162" y="36" width="24" height="48" fill="none" stroke="rgba(255,255,255,.35)"/>${rects}<text x="182" y="114" text-anchor="end" fill="rgba(255,255,255,.5)" font-size="8">ATTACKING &#8594;</text></svg>`;
}

function radarChart(metrics){
  const N=metrics.length;
  if(N<3)return '';
  const cx=110,cy=115,R=78;
  const angle=i=>-Math.PI/2+(i/N)*2*Math.PI;
  const pt=(r,i)=>{const a=angle(i);return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};};
  const ps=(r,i)=>{const p=pt(r,i);return p.x.toFixed(1)+','+p.y.toFixed(1);};
  const ptList=r=>metrics.map((_,i)=>ps(r,i)).join(' ');
  const rings=[25,50,75,100].map(v=>`<polygon points="${ptList((v/100)*R)}" fill="none" stroke="#E5E0E6" stroke-width="0.8"/>`).join('');
  const spokes=metrics.map((_,i)=>{const p=pt(R,i);return `<line x1="${cx}" y1="${cy}" x2="${p.x.toFixed(1)}" y2="${p.y.toFixed(1)}" stroke="#E5E0E6" stroke-width="0.8"/>`;}).join('');
  const dataPts=metrics.map((m,i)=>ps((m.pct/100)*R,i)).join(' ');
  const dots=metrics.map((m,i)=>{const p=pt((m.pct/100)*R,i);return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="#822D3A"/>`;}).join('');
  const labels=metrics.map((m,i)=>{
    const p=pt(R+20,i);
    const anchor=p.x<cx-5?'end':p.x>cx+5?'start':'middle';
    const lbl=m.label.length>14?m.label.substring(0,13)+'.':m.label;
    return `<text x="${p.x.toFixed(1)}" y="${(p.y+3).toFixed(1)}" text-anchor="${anchor}" font-size="8.5" fill="#7C7682" font-family="Inter,sans-serif">${lbl}</text><text x="${p.x.toFixed(1)}" y="${(p.y+12).toFixed(1)}" text-anchor="${anchor}" font-size="8" fill="#1565C0" font-family="monospace" font-weight="bold">${m.pct}</text>`;
  }).join('');
  return `<svg viewBox="0 0 220 230" width="220" height="230" style="display:block;margin:0 auto;">${rings}${spokes}<polygon points="${dataPts}" fill="#1565C0" fill-opacity="0.12" stroke="#1565C0" stroke-width="1.8"/>${dots}${labels}<text x="${cx}" y="${cy}" text-anchor="middle" font-size="9" fill="#C2B8BC" font-family="monospace">Percentile</text></svg>`;
}

}

function getPositionCounts(){const c={};REPORTS.forEach(p=>{c[p.posGroup]=(c[p.posGroup]||0)+1;});return c;}

function renderMainFilters(){
  const onPos=!['All','Featured'].includes(activeFilter)&&filterMode==='main'?activeFilter:null;
  document.getElementById('mainFilters').innerHTML=[
    `<button class="${activeFilter==='All'?'on':''}" onclick="setFilter('All')">All</button>`,
    `<button class="${activeFilter==='Featured'?'on':''}" onclick="setFilter('Featured')">Featured</button>`,
    `<button class="${onPos?'on':''}" onclick="openPositionsMenu()">Positions ${onPos?'('+onPos+')':''} &#9656;</button>`,
    `<button class="wc-btn" onclick="showWorldCup()">World Cup 2026</button>`,
  ].join('');
}

function renderPosFilters(){
  const counts=getPositionCounts();
  const posButtons=Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([pos,n])=>`<button class="${activeFilter===pos?'on':''}" onclick="setPosFilter('${esc(pos)}')">${esc(pos)} (${n})</button>`).join('');
  document.getElementById('posFilters').innerHTML=`<button class="back-btn" onclick="closePositionsMenu()">&#8592; Back</button>${posButtons}`;
}

function openPositionsMenu(){filterMode='positions';document.getElementById('mainFilters').classList.add('hidden');document.getElementById('posFilters').classList.remove('hidden');renderPosFilters();}
function closePositionsMenu(){filterMode='main';document.getElementById('posFilters').classList.add('hidden');document.getElementById('mainFilters').classList.remove('hidden');renderMainFilters();}
function setPosFilter(pos){activeFilter=pos;closePositionsMenu();renderBoard();}
function setFilter(f){activeFilter=f;filterMode='main';document.getElementById('posFilters').classList.add('hidden');document.getElementById('mainFilters').classList.remove('hidden');renderMainFilters();renderBoard();}

  else if(activeFilter==='Featured'){list=REPORTS.filter(p=>p.featured);}
  else{list=REPORTS.filter(p=>p.posGroup===activeFilter);}
  if(searchQuery){list=list.filter(p=>p.name.toLowerCase().includes(searchQuery)||p.club.toLowerCase().includes(searchQuery)||p.posGroup.toLowerCase().includes(searchQuery)||(p.meta.Nationality&&p.meta.Nationality.toLowerCase().includes(searchQuery)));}
  const cards=list.map(p=>{
    const t=topMetric(p);
    const star=p.featured?`<div class="feat-star">&#9733;</div>`:'';
    return `<button class="pcard" style="--c:${p.theme.claret}" onclick="showReport('${p.id}','board')">
      <div class="top" style="background:${p.theme.claret}">
        ${star}<span class="ghost">${p.number||''}</span>
        <span class="club">${esc(p.club)}</span>
        <div class="nm">${esc(p.name)}</div>
        <div class="sub">${esc(p.meta.Position)} &middot; ${esc(p.meta.Age)}</div>
      </div>
      <div class="body">
        <div class="vt">${esc(p.verdict.split('.')[0])}.</div>
        <div class="badge"><b>${t.pct}th</b> pct &middot; ${esc(t.label)}</div>
      </div>
    </button>`;
  }).join('');
  const empty=list.length===0?`<div class="addtile"><div class="plus">&#9679;</div><p>No reports in this section yet.</p></div>`:'';
  const addTile=activeFilter==='All'?`<div class="addtile"><div class="plus">+</div><p>Your next report goes here.</p></div>`:'';
  document.getElementById('board').innerHTML=cards+empty+addTile;
}

/* ══ WORLD CUP BOARD ══ */
function renderWorldCupBoard(){
  const wc=REPORTS.filter(p=>p.worldCup).sort((a,b)=>{
    if(!a.dateAdded&&!b.dateAdded)return 0;if(!a.dateAdded)return 1;if(!b.dateAdded)return -1;
    return new Date(b.dateAdded)-new Date(a.dateAdded);
  });
  const nations=new Set(wc.map(p=>p.meta.Nationality));
  document.getElementById('wcMeta').innerHTML=[[wc.length,'Reports'],[nations.size,'Nations']].map(([n,l])=>`<div class="wc-stat"><div class="n">${n}</div><div class="l">${esc(l)}</div></div>`).join('');
  const cards=wc.map(p=>{
    const t=topMetric(p);
    const dl=p.dateAdded?new Date(p.dateAdded).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'';
    return `<button class="pcard" style="--c:${p.theme.claret}" onclick="showReport('${p.id}','worldcup')">
      <div class="top" style="background:${p.theme.claret}">
        <span class="ghost">${p.number||''}</span>
        <span class="club">${esc(p.club)} &middot; ${esc(p.meta.Nationality)}</span>
        <div class="nm">${esc(p.name)}</div>
        <div class="sub">${esc(p.meta.Position)} &middot; Age ${esc(p.meta.Age)}</div>
      </div>
      <div class="body">
        <div class="vt">${esc(p.verdict.split('.')[0])}.</div>
        <div class="badge"><b>${t.pct}th</b> pct &middot; ${esc(t.label)}</div>
        ${dl?`<div style="font-size:10.5px;color:var(--muted);margin-top:2px;">Added ${esc(dl)}</div>`:''}
      </div>
    </button>`;
  }).join('');
  const empty=wc.length===0?`<div class="addtile"><div class="plus">&#9733;</div><p>No World Cup reports yet. Set worldCup: true to add.</p></div>`:'';
  document.getElementById('wcBoard').innerHTML=cards+empty;
}

/* ══ REPORT ══ */
function renderReport(p){
  const el=document.getElementById('report');
  el.style.setProperty('--claret',p.theme.claret);
  el.style.setProperty('--blue',p.theme.blue);
  const meta=Object.entries(p.meta).map(([k,v],i)=>`${i?'<span class="dot">&middot;</span>':''}<span>${esc(k)} <b>${esc(v)}</b></span>`).join(' ');
  const chips=p.chips.map(c=>`<div class="chip"><span class="k">${esc(c.k)}</span><span class="v">${esc(c.v)}</span></div>`).join('');
  const bars=p.percentiles.map(b=>`<div class="bar"><div class="bar-label">${esc(b.label)}<small>${esc(b.per90)} per 90</small></div><div class="track"><div class="fill" data-w="${b.pct}" style="background:${tier(b.pct)}"></div></div><div class="pct">${b.pct}<small>th</small></div></div>`).join('');
  const rateHTML=p.rates&&p.rates.length?`<h3 class="bt" style="font-size:13px;margin-top:14px;">Duel success rate</h3><div class="rates">${p.rates.map(r=>`<div class="rate"><div class="rate-top"><span class="lab">${esc(r.label)}</span><span class="num">${r.pct}%</span></div><div class="rate-track"><div class="rate-fill" data-w="${r.pct}"></div></div></div>`).join('')}</div>`:'';
  const listBlock=(cls,title,items)=>`<div class="col ${cls}"><h4>${esc(title)}</h4><ul>${items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`;
  el.innerHTML=`
    <div class="np">
      <div class="np-ghost">${p.number||''}</div>
      <div class="np-grid">
        <div class="np-left">
          <p class="eb">Scouting Report &middot; ${esc(p.club)}</p>
          <h2>${esc(p.name)}</h2>
          <div class="np-meta">${meta}</div>
          <div class="chips">${chips}</div>
        </div>
        <div class="np-right">
          <div class="pitch-wrap">${pitchSVG(p.positions)}<div class="pitch-cap">${p.positions.join(' / ')} zone</div></div>
        </div>
      </div>
    </div>
    <div class="verdict-block"><div class="eb2">Scout verdict</div><p>${esc(p.verdict)}</p></div>
    <div class="block"><div class="eb2">Profile and role</div><p class="lede">${esc(p.role)}</p></div>
    <div class="block">
      <div class="eb2">Statistical profile</div>
      <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;margin-bottom:16px;">
        <div style="flex:0 0 220px;">${radarChart(p.percentiles)}</div>
        <div style="flex:1;min-width:200px;">
          <h3 class="bt">Percentile rank (per 90, vs peers)</h3>
          <div class="legend">
            <span><i style="background:#1565C0"></i>Elite (&ge;80th)</span>
            <span><i style="background:#822D3A"></i>Solid (50&ndash;79th)</span>
            <span><i style="background:#A0968C"></i>Work-on (&lt;50th)</span>
          </div>
          ${bars}${rateHTML}
          <p class="note">${esc(p.percentileNote)}</p>
        </div>
      </div>
    </div>
    <div class="block"><div class="cols">${listBlock('s','Strengths',p.strengths)}${listBlock('w','Development areas',p.weaknesses)}</div></div>
    <div class="block"><div class="callout"><div class="eb2">Context</div><h3 class="bt" style="font-size:13px;">${esc(p.callout.title)}</h3><p>${esc(p.callout.body)}</p></div></div>
    <div class="block"><div class="eb2">Outlook</div><h3 class="bt" style="font-size:13px;">${esc(p.projection.title)}</h3><p class="lede">${esc(p.projection.body)}</p></div>
    <div class="foot-r">
      <p class="method">Method: data narrows the search and the eye decides. Percentiles flag where to look; judgement weighs level, age and role.</p>
      <div class="fr">
        <span><b>Sources:</b> ${p.sources.map(esc).join(' &middot; ')}</span>
        <span><b>Compiled:</b> ${esc(p.generated)}</span>
      </div>
      <button onclick="copyLink('${p.id}')" style="background:none;border:1px solid #E7DFE2;border-radius:20px;padding:5px 12px;font-size:11px;color:var(--muted);cursor:pointer;margin-top:8px;">Copy report link</button>
    </div>`;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{el.querySelectorAll('.fill,.rate-fill').forEach(f=>f.style.width=f.dataset.w+'%');}));
}

/* ══ NAVIGATION ══ */
function showReport(id,origin){
  const p=REPORTS.find(r=>r.id===id);
  if(!p)return;
  currentReportId=id;
  reportOrigin=origin||'board';
  document.getElementById('backBtn').textContent=origin==='worldcup'?'\u2190 Back to World Cup':'\u2190 Back to Board';
  renderReport(p);
  document.getElementById('boardView').classList.add('hidden');
  document.getElementById('worldCupView').classList.add('hidden');
  document.getElementById('reportView').classList.remove('hidden');
  history.pushState(null,'','#'+id);
  window.scrollTo(0,0);
}
function goBack(){
  history.pushState(null,'',window.location.pathname);
  document.getElementById('reportView').classList.add('hidden');
  if(reportOrigin==='worldcup')showWorldCup(); else showBoard();
  window.scrollTo(0,0);
}
function showWorldCup(){
  document.getElementById('boardView').classList.add('hidden');
  document.getElementById('reportView').classList.add('hidden');
  document.getElementById('worldCupView').classList.remove('hidden');
  renderWorldCupBoard();window.scrollTo(0,0);
}
function showBoard(){
  document.getElementById('worldCupView').classList.add('hidden');
  document.getElementById('reportView').classList.add('hidden');
  document.getElementById('boardView').classList.remove('hidden');
  window.scrollTo(0,0);
}

/* ══ COMPARE ══ */
function openCompareSearch(){
  filterCompareList('');
  document.getElementById('compareSearchInput').value='';
  document.getElementById('compareOverlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('compareSearchInput').focus(),80);
}
function closeCompareSearch(e){
  if(e&&e.target!==document.getElementById('compareOverlay'))return;
  document.getElementById('compareOverlay').classList.add('hidden');
}
function filterCompareList(query){
  const q=query.toLowerCase().trim();
  const pool=REPORTS.filter(r=>r.id!==currentReportId);
  const results=q?pool.filter(r=>r.name.toLowerCase().includes(q)||r.club.toLowerCase().includes(q)||r.posGroup.toLowerCase().includes(q)):pool;
  const el=document.getElementById('compareResults');
  if(!results.length){el.innerHTML=`<div class="compare-empty">No players found.</div>`;return;}
  el.innerHTML=results.map(p=>`<div class="compare-result-item" onclick="runComparison('${currentReportId}','${p.id}')"><div class="compare-result-dot" style="background:${p.theme.claret}">${p.number||''}</div><div><div class="compare-result-name">${esc(p.name)}</div><div class="compare-result-sub">${esc(p.club)} &middot; ${esc(p.posGroup)}</div></div></div>`).join('');
}
function runComparison(id1,id2){
  document.getElementById('compareOverlay').classList.add('hidden');
  const p1=REPORTS.find(r=>r.id===id1),p2=REPORTS.find(r=>r.id===id2);
  if(!p1||!p2)return;
  function getMet(p){
    if(p.universalMetrics){const L={goalInvolvement:'Goal Involvement',progressiveActions:'Progressive Actions',duelWins:'Duels Won',xGxA:'xG + xA',shots:'Shots',distance:'Distance'};return Object.entries(p.universalMetrics).filter(([,v])=>v&&v.pct>0).map(([k,v])=>({label:L[k]||k,per90:v.value,pct:v.pct}));}
    return p.percentiles;
  }
  const m1=getMet(p1),m2=getMet(p2);
  const uniMode=p1.universalMetrics&&p2.universalMetrics;
  function col(p,metrics){
    const bars=metrics.map(m=>`<div style="margin:10px 0;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="font-weight:600;">${esc(m.label)}</span><span style="font-family:monospace;font-weight:700;color:#1565C0;">${m.pct}th</span></div><div style="background:#EFEAEC;border-radius:3px;height:12px;overflow:hidden;"><div style="width:${m.pct}%;height:12px;border-radius:3px;background:${tier(m.pct)};"></div></div><div style="font-size:10px;color:#9E9E9E;margin-top:2px;">${m.per90} per 90</div></div>`).join('');
    return `<div style="flex:1;min-width:260px;background:#fff;border-radius:8px;padding:18px;border:1px solid #E5E0E6;"><div style="background:${p.theme.claret};color:#fff;padding:12px 16px;border-radius:6px;margin-bottom:16px;"><div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;opacity:.8;">${esc(p.club)}</div><div style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;line-height:1.1;">${esc(p.name)}</div><div style="font-size:11px;opacity:.85;margin-top:4px;">${esc(p.meta.Position)} &middot; Age ${esc(p.meta.Age)}</div></div>${bars}<button onclick="showReport('${p.id}','board')" style="width:100%;margin-top:12px;padding:9px;background:${p.theme.claret};color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;">Open Full Report</button></div>`;
  }
  document.getElementById('report').innerHTML=`<div style="padding:20px 20px 28px;"><div style="margin-bottom:18px;"><div style="font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#7C7682;margin-bottom:4px;">Side by side</div><h2 style="font-family:'Oswald',sans-serif;font-size:30px;text-transform:uppercase;margin:0;">Comparison</h2><p style="color:#7C7682;font-size:13px;margin:6px 0 0;">${uniMode?'Universal metrics — standardised across positions.':'Position-specific percentile ranks. All values are 0-100.'}</p></div><div style="display:flex;gap:16px;flex-wrap:wrap;">${col(p1,m1)}${col(p2,m2)}</div></div>`;
  document.getElementById('boardView').classList.add('hidden');
  document.getElementById('reportView').classList.remove('hidden');
  window.scrollTo(0,0);
}

/* ══ SEARCH ══ */
function handleSearch(q){searchQuery=q.toLowerCase().trim();renderBoard();}

/* ══ SHAREABLE LINKS ══ */
function copyLink(id){
  const url=window.location.origin+window.location.pathname+'#'+id;
  navigator.clipboard.writeText(url).then(()=>alert('Link copied: '+url));
}

/* ══ SUBSCRIBE ══ */
async function subscribe(){
  const email=document.getElementById('subEmail').value.trim();
  const name=document.getElementById('subName').value.trim();
  if(!email||!email.includes('@')){document.getElementById('subMsg').textContent='Please enter a valid email address.';return;}
  if(!hubSb){document.getElementById('subMsg').textContent='Subscribe feature not yet configured.';return;}
  const{error}=await hubSb.from('subscribers').insert({email,name});
  if(error&&error.code==='23505'){document.getElementById('subMsg').textContent='You are already subscribed.';}
  else if(error){document.getElementById('subMsg').textContent='Something went wrong. Please try again.';}
  else{document.getElementById('subForm').style.display='none';document.getElementById('subMsg').textContent='Subscribed. You will hear from us when the next report drops.';}
}

/* ══ INIT ══ */
renderMast();
renderMainFilters();
renderBoard();
if(window.location.hash){const hid=window.location.hash.replace('#','');const hp=REPORTS.find(r=>r.id===hid);if(hp)showReport(hid,'board');}
</script>
